services:
  koreanwordle:
    build:
      context: .
      dockerfile: Dockerfile
    image: koreanwordle:latest
    container_name: koreanwordle
    restart: unless-stopped
    mem_limit: 1400m
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      PORT: 8080
      JAVA_OPTS: "-Xms256m -Xmx1100m"

      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/wordle?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      SPRING_DATASOURCE_USERNAME: wordleuser
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 4
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: 1
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"

  mysql:
    image: mysql:8.0
    container_name: koreanwordle-mysql
    restart: unless-stopped
    mem_limit: 384m
    environment:
      MYSQL_DATABASE: wordle
      MYSQL_USER: wordleuser
      MYSQL_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    command:
      - --max_connections=20
      - --innodb_buffer_pool_size=128M
      - --performance_schema=OFF
      - --table_open_cache=128
      - --tmp_table_size=16M
      - --max_heap_table_size=16M
      - --thread_cache_size=4
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mysql-data:
